<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urgent Question for Sneha!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ffeef8 0%, #ffd3eb 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            text-align: center;
        }

        .container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(223, 112, 177, 0.3);
            max-width: 500px;
            width: 90%;
            position: relative;
            transition: all 0.3s ease;
        }

        h1 {
            color: #d81b60;
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .gif-container {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px;
            position: relative;
            align-items: center;
        }

        button {
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s;
        }

        #yesBtn {
            background-color: #4caf50;
            color: white;
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        #yesBtn:hover {
            background-color: #43a047;
            transform: scale(1.1);
        }

        #noBtn {
            background-color: #f44336;
            color: white;
            position: absolute;
            box-shadow: 0 5px 15px rgba(244, 67, 54, 0.4);
            transition: left 0.15s ease-out, top 0.15s ease-out;
            white-space: nowrap;
        }

        /* Success State */
        .hidden {
            display: none !important;
        }

        .success-message {
            color: #d81b60;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container" id="mainCard">
        <div class="gif-container" id="emojiIcon">☕</div>
        
        <div id="questionState">
            <h1>Hey Sneha! ❤️</h1>
            <p class="subtitle">Dinesh has a highly critical, legally binding, totally serious question for you...</p>
            <h2 style="color: #333; margin-bottom: 40px;">Will you go out on a coffee date with me?</h2>
            
            <div class="btn-container">
                <button id="yesBtn" onclick="celebrate()">YES!</button>
                <button id="noBtn" onmouseover="runAway()" onclick="runAway()">No 😢</button>
            </div>
        </div>

        <div id="successState" class="hidden">
            <h1 class="success-message">Woohoo! 🎉</h1>
            <h2 style="color: #333;">Excellent choice, Sneha.</h2>
            <p class="subtitle" style="margin-top: 20px;">
                You have officially agreed to a coffee date with <strong>Dinesh</strong>.<br>
                No take-backs. Screenshot taken. See you soon! ☕✨
            </p>
        </div>
    </div>

    <canvas id="confetti" style="position: absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 999;"></canvas>

    <script>
        const noBtn = document.getElementById('noBtn');
        const questionState = document.getElementById('questionState');
        const successState = document.getElementById('successState');
        const emojiIcon = document.getElementById('emojiIcon');

        // Funny alternative texts for the No button as she tries to click it
        const funnyTexts = [
            "Wait, wrong button!",
            "Are you sure?",
            "Try again 😂",
            "Error 404: Option Not Found",
            "Dinesh is sad now.",
            "Nice try!",
            "Click YES instead ➡️",
            "Nope! 🏃‍♂️"
        ];

        function runAway() {
            // Get container boundaries so the button doesn't fly off the screen completely
            const container = document.getElementById('mainCard');
            const padding = 40;
            
            const maxX = container.clientWidth - noBtn.clientWidth - padding;
            const maxY = container.clientHeight - noBtn.clientHeight - padding;

            // Generate random positions within the card
            const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
            const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

            // Shift position
            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;

            // Change text randomly to be cheeky
            const randomText = funnyTexts[Math.floor(Math.random() * funnyTexts.length)];
            noBtn.innerText = randomText;
        }

        function celebrate() {
            // Swap screens
            questionState.classList.add('hidden');
            successState.classList.remove('hidden');
            emojiIcon.innerText = "🥳💖";
            
            // Fire up some simple confetti
            startConfetti();
        }

        // Basic Confetti Animation
        function startConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let pieces = [];
            const numberOfPieces = 150;
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#ffeb3b', '#4caf50', '#00bcd4'];

            for (let i = 0; i < numberOfPieces; i++) {
                pieces.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height - canvas.height,
                    rotation: Math.random() * 360,
                    speed: 4 + Math.random() * 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    width: Math.random() * 12 + 6,
                    height: Math.random() * 12 + 6
                });
            }

            function update() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                pieces.forEach((p) => {
                    p.y += p.speed;
                    p.rotation += p.speed;
                    ctx.fillStyle = p.color;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillRect(-p.width/2, -p.height/2, p.width, p.height);
                    ctx.restore();
                });
                requestAnimationFrame(update);
            }
            update();
        }
    </script>
</body>
</html>
